name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: JS syntax check
        run: |
          for f in $(find . -name '*.js' -not -path './node_modules/*'); do
            node --check "$f" || exit 1
          done

      - name: HTML validate
        run: npx --yes html-validate@8 *.html

      - name: Internal link + manifest check
        run: node scripts/check-links.js

      - name: sw.js cache-bump check
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: node scripts/check-sw-cache-bump.js

      - name: Unit tests
        run: npm test
